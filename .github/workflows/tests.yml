name: tests
on: [push, pull_request]

# Started suites always run to completion - nothing cancels them; add
# runners when they queue. To keep a pull request from an in-repo
# branch from double-running the suite, the pull_request event only
# runs for forks, which never trigger the push event.

env:
  CI: github

jobs:
  build:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: [self-hosted, Linux]
    steps:
      # A cancelled job never reaches its clean-up: its containers keep
      # running and keep writing root-owned files into the workspace.
      # Stop them first (bin/down from the previous checkout knows all
      # project-name variants).
      - name: Stop leftover containers
        run: bin/down
        continue-on-error: true
      # Containers write root-owned files (assets, tmp) into the workspace;
      # reclaim it so checkout can clean up.
      - name: Directory permissions
        run: docker run --rm -v .:/app alpine sh -c "chown -R $(id -u):$(id -g) /app && chmod -R 777 /app"
        continue-on-error: true
      - uses: actions/checkout@v4
      - name: Build test images
        run: bin/setup_ci

  specs:
    runs-on: [self-hosted, Linux]
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: engine models
            command: bin/rspec_ci your_platform/spec/models
          - name: engine features a-l
            command: bin/rspec_ci your_platform/spec/features/[a-l]*
          - name: engine features m-z
            command: bin/rspec_ci your_platform/spec/features/[m-z]*
          - name: app models
            command: bin/rspec_ci spec/models
          - name: app features
            command: bin/rspec_ci spec/features
    name: ${{ matrix.name }}
    steps:
      # See the build job: stop containers a cancelled job left behind.
      - name: Stop leftover containers
        run: bin/down
        continue-on-error: true
      - name: Directory permissions
        run: docker run --rm -v .:/app alpine sh -c "chown -R $(id -u):$(id -g) /app && chmod -R 777 /app"
        continue-on-error: true
      - uses: actions/checkout@v4
        with:
          # AppVersion reads `git describe`; the default shallow clone
          # carries no tags, which fails the app_version specs.
          fetch-depth: 0
      - name: Run specs
        run: ${{ matrix.command }}
