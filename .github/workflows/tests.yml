name: tests
on: [push]

env:
  CI: github

jobs:
  build:
    runs-on: [self-hosted, Linux]
    steps:
      # Containers write root-owned files (assets, tmp) into the workspace;
      # reclaim it so checkout can clean up.
      - name: Directory permissions
        run: docker run --rm -v .:/app alpine sh -c "chown -R $(id -u):$(id -g) /app && chmod -R 777 /app"
        continue-on-error: true
      - uses: actions/checkout@v4
      - name: Build test images
        run: bin/setup_ci

  specs:
    runs-on: [self-hosted, Linux]
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: engine models
            command: bin/rspec_ci your_platform/spec/models
          - name: engine features a-l
            command: bin/rspec_ci your_platform/spec/features/[a-l]*
          - name: engine features m-z
            command: bin/rspec_ci your_platform/spec/features/[m-z]*
          - name: app models
            command: bin/rspec_ci spec/models
          - name: app features
            command: bin/rspec_ci spec/features
    name: ${{ matrix.name }}
    steps:
      - name: Directory permissions
        run: docker run --rm -v .:/app alpine sh -c "chown -R $(id -u):$(id -g) /app && chmod -R 777 /app"
        continue-on-error: true
      - uses: actions/checkout@v4
      - name: Run specs
        run: ${{ matrix.command }}
