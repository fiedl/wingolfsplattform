# Development and test stack. Start the web interface with:
#
#     docker compose up web
#
# The bin/ wrappers (bin/rails, bin/rspec, bin/dev, ...) run themselves
# in these services via bin/docker_wrapper.rb, so they can be called
# directly from the host. Values like RAILS_PORT can be overridden
# through a .env file — see the README section on environment variables.

volumes:
  postgres_data: {}
  postgres_test_data: {}
  mysql_data: {}
  redis_data: {}
  neo4j_data: {}
  wingolfsplattform_uploads: {}
  wingolfsplattform_assets: {}
  wingolfsplattform_tmp: {}
  # Gems installed by bin/bundle_exec survive the container.
  bundle_cache: {}
  # Javascript modules stay out of the host checkout (yarn runs as root
  # in the container and would litter it with root-owned files).
  node_modules_cache: {}

services:

  # Base service the app services extend; not started on its own.
  rails:
    build:
      context: .
      target: development
    volumes:
      - .:/rails
      - "bundle_cache:/usr/local/bundle"
      - "node_modules_cache:/rails/your_platform/node_modules"
      - "wingolfsplattform_assets:/rails/public/assets"
    environment:
      RAILS_ENV: "${RAILS_ENV:-development}"
      RAILS_PORT: "${RAILS_PORT:-3000}"
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL: http://neo4j:trinity@neo4j:7474
      WAIT_HOSTS: "postgres:5432, redis:6379, neo4j:7474"
    tty: true
    stdin_open: true

  web:
    extends:
      service: rails
    volumes:
      - "wingolfsplattform_uploads:/rails/uploads"
      # tmp in a volume keeps root-owned pid/cache files out of the host
      # checkout. The tests service leaves tmp on the host instead —
      # bin/rspec_ci reads the rspec example statuses from there.
      - "wingolfsplattform_tmp:/rails/tmp"
    ports:
      - "0.0.0.0:${RAILS_PORT:-3000}:${RAILS_PORT:-3000}"
      # webpack-dev-server, serving the vue packs in development (the
      # layouts load them from localhost:9000, started by bin/dev).
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      sidekiq:
        condition: service_started
    command: bash -c "/wait && bin/bundle_exec bin/server"

  console:
    extends:
      service: rails
    volumes:
      - "wingolfsplattform_uploads:/rails/uploads"
      - "wingolfsplattform_tmp:/rails/tmp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    command: bash -c "/wait && bin/bundle_exec rails console"

  sidekiq:
    extends:
      service: rails
    volumes:
      - "wingolfsplattform_uploads:/rails/uploads"
      - "wingolfsplattform_tmp:/rails/tmp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    command: bash -c "/wait && bin/bundle_exec bin/sidekiq"

  tests:
    extends:
      service: rails
    # A fixed image name: CI jobs run in per-runner compose projects, and
    # without it every project would build its own identically-named-but-
    # separate image instead of reusing the one the build job created.
    image: wingolfsplattform-tests
    environment:
      RAILS_ENV: test
      DB_HOST: postgres_test
      NEO4J_REST_URL_TEST: http://neo4j:trinity@neo4j:7474
      CHROME_URL: http://chrome:4444
      WAIT_HOSTS: "postgres_test:5432, redis:6379, neo4j:7474"
    depends_on:
      postgres_test:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      chrome:
        condition: service_started
    command: bash -c "/wait && bin/bundle_exec rspec spec/models"

  guard:
    extends:
      service: tests
    # schema:load instead of migrate: the migration history contains
    # mysql-only SQL and is not replayed on postgres.
    command: bash -c "/wait && bin/bundle_exec bash -c 'bundle exec rails db:create db:schema:load && bundle exec guard'"

  chrome:
    image: selenium/standalone-chromium:4.27.0
    shm_size: 2gb
    environment:
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_SESSION_TIMEOUT: 600

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "wingolfsplattform_development"
      POSTGRES_PASSWORD: "secret"
      # ICU with German rules gives umlaut-aware ordering, comparable
      # to mysql's utf8_unicode_ci, without generating OS locales.
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=de-DE --locale=C.UTF-8"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres_test:
    image: postgres:17
    environment:
      POSTGRES_DB: "wingolfsplattform_test"
      POSTGRES_PASSWORD: "secret"
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=de-DE --locale=C.UTF-8"
    volumes:
      # A separate volume: postgres and postgres_test may run at the
      # same time, and two servers on one datadir corrupt it.
      - "postgres_test_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  # The mysql service stays until the production cutover to postgres
  # is through: the pgloader rehearsal restores a production dump here
  # and copies it into the postgres service.
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: "wingolfsplattform_development"
      MYSQL_PASSWORD: "secret"
      MYSQL_ROOT_PASSWORD: "secret"
      MYSQL_USER: "wingolfsplattform"
    volumes:
      - "mysql_data:/var/lib/mysql"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-use-native-aio=0"

  redis:
    image: redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:3.5
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: "neo4j/trinity"
      # The parallelized test suite queries neo4j from many processes at
      # once; the default 512M heap collapses under that load.
      NEO4J_dbms_memory_heap_initial__size: "2G"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
