# Start with:
# docker-compose up rails

version: '3'

volumes:
  postgres_data: {}
  postgres_test_data: {}
  mysql_data: {}
  redis_data: {}
  neo4j_data: {}
  wingolfsplattform_uploads: {}
  wingolfsplattform_assets: {}
  wingolfsplattform_tmp: {}

services:
  rails:
    build: .
    depends_on:
      - postgres
      - redis
      - neo4j
      - sidekiq
    volumes:
      - .:/app/wingolfsplattform
      - ./your_platform:/app/your_platform
      - "wingolfsplattform_uploads:/app/wingolfsplattform/uploads"
      - "wingolfsplattform_assets:/app/wingolfsplattform/public/assets"
      - "wingolfsplattform_tmp:/app/wingolfsplattform/tmp"
      - "./config/secrets.docker.yml:/app/wingolfsplattform/config/secrets.yml"
      - "./config/database.docker.yml:/app/wingolfsplattform/config/database.yml"
    expose:
      - 3000
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL: http://neo4j:trinity@neo4j:7474
    command:
      - ./start

  console:
    build: .
    volumes:
      - .:/app/wingolfsplattform
      - ./your_platform:/app/your_platform
      - "wingolfsplattform_uploads:/app/wingolfsplattform/uploads"
      - "wingolfsplattform_assets:/app/wingolfsplattform/public/assets"
      - "wingolfsplattform_tmp:/app/wingolfsplattform/tmp"
      - "./config/secrets.docker.yml:/app/wingolfsplattform/config/secrets.yml"
      - "./config/database.docker.yml:/app/wingolfsplattform/config/database.yml"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL: http://neo4j:trinity@neo4j:7474
    depends_on:
      - postgres
      - redis
      - neo4j
    command: /bin/bash -c "bundle exec rails console"

  tests:
    build: .
    # A fixed image name: CI jobs run in per-runner compose projects, and
    # without it every project would build its own identically-named-but-
    # separate image instead of reusing the one the build job created.
    image: wingolfsplattform-tests
    volumes:
      - .:/app/wingolfsplattform
      - ./your_platform:/app/your_platform
      - "wingolfsplattform_assets:/app/wingolfsplattform/public/assets"
      - "./config/secrets.docker.yml:/app/wingolfsplattform/config/secrets.yml"
      - "./config/database.docker.yml:/app/wingolfsplattform/config/database.yml"
    environment:
      RAILS_ENV: test
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL_TEST: http://neo4j:trinity@neo4j:7474
      CHROME_URL: http://chrome:4444
    depends_on:
      - postgres_test
      - redis
      - neo4j
      - chrome
    links:
      - "postgres_test:postgres"
    command: /bin/bash -c "bundle exec rake db:create db:schema:load && bundle exec rspec spec/models"

  chrome:
    image: selenium/standalone-chromium:4.27.0
    shm_size: 2gb
    environment:
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_SESSION_TIMEOUT: 600

  guard:
    build: .
    volumes:
      - .:/app/wingolfsplattform
      - ./your_platform:/app/your_platform
      - "wingolfsplattform_assets:/app/wingolfsplattform/public/assets"
      - "./config/secrets.docker.yml:/app/wingolfsplattform/config/secrets.yml"
      - "./config/database.docker.yml:/app/wingolfsplattform/config/database.yml"
    environment:
      RAILS_ENV: test
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL_TEST: http://neo4j:trinity@neo4j:7474
    depends_on:
      - postgres_test
      - redis
      - neo4j
    links:
      - "postgres_test:postgres"
    command: /bin/bash -c "bundle exec rake db:create db:schema:load && bundle exec guard"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "wingolfsplattform_development"
      POSTGRES_PASSWORD: "secret"
      # ICU with German rules gives umlaut-aware ordering, comparable
      # to mysql's utf8_unicode_ci, without generating OS locales.
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=de-DE --locale=C.UTF-8"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  postgres_test:
    image: postgres:17
    environment:
      POSTGRES_DB: "wingolfsplattform_test"
      POSTGRES_PASSWORD: "secret"
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=de-DE --locale=C.UTF-8"
    volumes:
      # A separate volume: postgres and postgres_test may run at the
      # same time, and two servers on one datadir corrupt it.
      - "postgres_test_data:/var/lib/postgresql/data"

  # The mysql service stays until the production cutover to postgres
  # is through: the pgloader rehearsal restores a production dump here
  # and copies it into the postgres service.
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: "wingolfsplattform_development"
      MYSQL_PASSWORD: "secret"
      MYSQL_ROOT_PASSWORD: "secret"
      MYSQL_USER: "wingolfsplattform"
    volumes:
      - "mysql_data:/var/lib/mysql"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-use-native-aio=0"

  redis:
    image: redis
    volumes:
      - redis_data:/var/lib/redis

  neo4j:
    image: neo4j:3.5
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: "neo4j/trinity"
      # The parallelized test suite queries neo4j from many processes at
      # once; the default 512M heap collapses under that load.
      NEO4J_dbms_memory_heap_initial__size: "2G"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"

  sidekiq:
    build: .
    volumes:
      - .:/app/wingolfsplattform
      - ./your_platform:/app/your_platform
      - "wingolfsplattform_uploads:/app/wingolfsplattform/uploads"
      - "wingolfsplattform_assets:/app/wingolfsplattform/public/assets"
      - "wingolfsplattform_tmp:/app/wingolfsplattform/tmp"
      - "./config/secrets.docker.yml:/app/wingolfsplattform/config/secrets.yml"
      - "./config/database.docker.yml:/app/wingolfsplattform/config/database.yml"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: secret
      REDIS_HOST: redis
      NEO4J_REST_URL: http://neo4j:trinity@neo4j:7474
    depends_on:
      - postgres
      - redis
      - neo4j
    command: /bin/bash -c "bundle exec sidekiq -c 10 -q default -q dag_links -q cache -q slow -q retry -q mailers -q mailgate --verbose"
