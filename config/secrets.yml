# Development and test run with these known dummy values; every value
# can be overridden through the environment — see the README section on
# environment variables (for example to try omniauth or mail delivery
# locally). Production provides real secrets through the environment
# only — nothing sensitive lives in the repository.

development:
  secret_key_base: <%= ENV.fetch("SECRET_KEY_BASE", "insecure_development_secret_key_base_" + "0" * 92) %>
  secret_token: <%= ENV.fetch("SECRET_TOKEN", "insecure_development_secret_token_" + "0" * 30) %>
  smtp_user: <%= ENV.fetch("SMTP_USER", "wingolfsplattform@wingolf.io") %>
  smtp_password: <%= ENV["SMTP_PASSWORD"] %>
  sso_secret: <%= ENV["SSO_SECRET"] %>

test:
  secret_key_base: <%= ENV.fetch("SECRET_KEY_BASE", "insecure_test_secret_key_base_" + "0" * 98) %>

production:
  secret_key_base: <%= ENV["SECRET_KEY_BASE"] %>
  secret_token: <%= ENV["SECRET_TOKEN"] %>
  smtp_user: <%= ENV["SMTP_USER"] %>
  smtp_password: <%= ENV["SMTP_PASSWORD"] %>
  sso_secret: <%= ENV["SSO_SECRET"] %>
