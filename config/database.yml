# Everything runs dockerized: the hosts default to the compose service
# names (the tests service points DB_HOST at mysql_test, see
# docker-compose.yml). Every value can be overridden through the
# environment — see the README section on environment variables.

development:
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_general_ci
  reconnect: false
  database: <%= ENV.fetch("DB_NAME", "wingolfsplattform_development") %>
  pool: 25
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "secret") %>
  host: <%= ENV.fetch("DB_HOST", "mysql") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>

test:
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_general_ci
  reconnect: false
  database: wingolfsplattform_test<%= ENV['TEST_ENV_NUMBER'] %>
  pool: 5
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "secret") %>
  host: <%= ENV.fetch("DB_HOST", "mysql") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>

# Production provides real credentials through the environment only.
production:
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_general_ci
  reconnect: false
  database: <%= ENV.fetch("DB_NAME", "wingolfsplattform_production") %>
  pool: 25
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>
